name: Atualizar Dashboard

on:
  # Roda automaticamente todo dia de segunda a sexta às 7h (horário de Brasília = 10h UTC)
  schedule:
    - cron: "0 10 * * 1-5"

  # Permite rodar manualmente pela interface do GitHub (botão "Run workflow")
  workflow_dispatch:

permissions:
  contents: write   # necessário para commitar o HTML gerado

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Criar pasta docs (se não existir)
        run: mkdir -p docs

      - name: Gerar dashboard
        env:
          DASHBOARD_FONTE: sheets
          CI: "true"
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: python processar_dashboard.py

      - name: Commitar e publicar HTML atualizado
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          # Só commita se houver mudança
          git diff --staged --quiet || git commit -m "dashboard: atualização automática $(date +'%d/%m/%Y %H:%M')"
          git push
